# The contents of this file is based on https://github.com/home-assistant/core/blob/dev/pyproject.toml

target-version = "py312"

[lint]
select = [
    "ALL",
]

ignore = [
    "ANN401", # Dynamically typed expressions (typing.Any) are disallowed
    "D203", # no-blank-line-before-class (incompatible with formatter)
    "D212", # multi-line-summary-first-line (incompatible with formatter)
    "COM812", # incompatible with formatter
    "ISC001", # incompatible with formatter
    "TC002", # Allow importing typing-dependent modules at runtime
    "TC003", # Allow collections imports outside type-checking blocks
    "TRY003", # Permit descriptive exception messages inline
    "EM101", # Allow string literals in exception constructors
    "EM102", # Allow f-strings in exception constructors
    "FBT001", # Allow bool positional arguments for API surface parity
    "PLR0912", # Allow complex helper functions for API data parsing
    "PLR0915", # Allow larger helper functions for aggregated state
    "D401", # Permit descriptive (non-imperative) docstrings
    "E501", # Defer line-length enforcement to formatter/docs
    "PLW0108", # False positive on `lambda x, _dev=device_id: f(...)` — the
               # `_dev=device_id` default-arg is an intentional Python idiom
               # for late binding inside a for-loop (capture the current
               # iteration's value, not the closure variable). Ruff 0.15
               # tightened PLW0108 and now flags this pattern as "inline-able".
]

# Relax the rule set for tests and scripts/ — these are not part of the shipped
# integration and the strict "ALL" select-list demands docstrings + type
# annotations that would add no signal.
[lint.per-file-ignores]
"tests/**" = [
    "D",        # docstring conventions
    "ANN",      # type annotations
    "S101",     # assert is fine in tests
    "S105",     # hard-coded test passwords are fine in fixtures
    "S106",     # hard-coded test passwords are fine in fixtures
    "S104",     # 0.0.0.0 sentinel comparisons in tests
    "PLR2004",  # magic-value comparisons are routine in test asserts
    "PLC0415",  # import-outside-toplevel is fine in tests
    "PLR0913",  # tests often need many fixture parameters
    "PLC2701",  # importing private symbols under test is intentional
    "SLF001",   # private-member access for testing internals
    "FBT001",   # bool positional args mirror production surface
    "FBT002",   # bool positional args mirror production surface
    "FBT003",   # boolean positional argument in test call
    "PT006",    # pytest.mark.parametrize signature style varies
    "PT007",    # tuple vs list inside parametrize is irrelevant
    "PT011",    # broad pytest.raises is acceptable in tests
    "BLE001",   # broad Exception catch in mock helpers
    "RUF029",   # async def without await acceptable for stubs
    "ARG001",   # unused function arguments common with fixtures
    "ARG002",   # unused method arguments mirror real signatures
    "ARG005",   # unused lambda arguments common in fixtures
    "INP001",   # implicit-namespace-package warning for test files
    "TID252",   # relative-imports in tests are fine
    "SIM117",   # nested with-blocks in HTTP mocks
    "N818",     # custom test-helper exception names
    "C408",     # dict() vs literal both fine in tests
    "C901",     # complex test fixtures are acceptable
    "ERA001",   # commented-out code in stubs is intentional
    "PT022",    # yield-based fixtures without finalize
]
"scripts/**" = [
    "D",
    "ANN",
    "T201",     # scripts print
    "S101",
    "S104",     # sentinel IP comparisons
    "BLE001",
    "PLR2004",
    "PLC0415",
    "PT",
    "INP001",
    "ARG001",
    "ARG005",
    "SIM117",
    "ERA001",
    "C901",
]

[lint.flake8-pytest-style]
fixture-parentheses = false

[lint.pyupgrade]
keep-runtime-typing = true

[lint.mccabe]
max-complexity = 25

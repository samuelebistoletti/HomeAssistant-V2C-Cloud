name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
  # Allow the release workflow (tag-and-release.yaml) to reuse this entire
  # pipeline via `uses: ./.github/workflows/security.yaml`. Keeps the security
  # gate definition in one place — adding a scanner here automatically gates
  # releases as well.
  workflow_call:

# When invoked directly (push/PR/schedule), cancel earlier in-flight runs on
# the same ref to save CI minutes. When invoked as a workflow_call (from
# tag-and-release.yaml), use a unique group keyed on the calling workflow so
# the standalone run does NOT cancel the reusable invocation (or vice versa).
concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

jobs:
  bandit:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: |
          bandit -r custom_components/v2c_cloud/ \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true
          bandit -r custom_components/v2c_cloud/ \
            --severity-level medium \
            --confidence-level medium

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  pip-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit runtime dependencies
        run: pip-audit -r requirements.txt --format=columns --strict

      # Test dependencies are NOT shipped to users: the integration declares
      # `"requirements": []` in manifest.json — aiohttp is provided by Home
      # Assistant core at runtime, not by this package. aiohttp is pinned to
      # <3.14 here ONLY for the test harness, because aioresponses 0.7.8 (its
      # latest release) has an ABI break with aiohttp 3.14+ (missing
      # `stream_writer` kwarg — see requirements_test.txt). That pin reintroduces
      # CVE-2026-34993 and CVE-2026-47265 (both fixed in aiohttp 3.14.0), so they
      # are ignored on the test-deps audit until aioresponses ships a 3.14-compatible
      # release. End users are unaffected (HA core provides a patched aiohttp).
      # The runtime audit above stays --strict with zero ignores.
      - name: Audit test dependencies
        run: |
          pip-audit -r requirements_test.txt --format=columns --strict \
            --ignore-vuln CVE-2026-34993 \
            --ignore-vuln CVE-2026-47265

  gitleaks:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Tag and Release on manifest.json version change

on:
  push:
    # Only main: feature branches may bump manifest.json during review without
    # accidentally creating a release tag from the feature branch HEAD.
    branches: [main]
    paths:
      - 'custom_components/v2c_cloud/manifest.json'

# A release is keyed on a specific manifest.json commit; do not allow two
# concurrent runs to race for the same tag.
concurrency:
  group: tag-and-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        # Same matrix as tests.yaml so a release cannot ship a version that
        # fails on a Python version we claim to support.
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements_test.txt

      - name: Install dev + test dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements_test.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: python -m pytest tests/ -v

  # Reuse the canonical security pipeline defined in security.yaml.
  # Single source of truth for SAST / dependency-audit / secret-scan gates.
  security:
    uses: ./.github/workflows/security.yaml
    permissions:
      contents: read
      security-events: read

  hassfest:
    name: hassfest validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b  # master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: hacs/action@d556e736723344f83838d08488c983a15381059a  # v22.5.0
        with:
          category: integration

  tag-and-release:
    runs-on: ubuntu-latest
    needs: [test, security, hassfest, hacs]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # We need write access for `git push origin tag` below, so we keep
          # the default credentials (no persist-credentials: false here).

      - name: Extract version from manifest.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' custom_components/v2c_cloud/manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag exists"
            echo "EXISTS=true" >> $GITHUB_ENV
          else
            echo "Tag does not exist"
            echo "EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Create tag and push
        if: env.EXISTS == 'false'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Prepare release notes from changelog
        if: env.EXISTS == 'false'
        run: |
          python <<'PY'
          import os
          import pathlib
          import re
          import sys

          version = os.environ["VERSION"]
          changelog_path = pathlib.Path("CHANGELOG.md")
          if not changelog_path.exists():
              sys.exit("CHANGELOG.md not found")

          text = changelog_path.read_text(encoding="utf-8")
          pattern = rf"^## \[{re.escape(version)}\].*?(?=^## \[|\Z)"
          match = re.search(pattern, text, flags=re.MULTILINE | re.DOTALL)
          if not match:
              sys.exit(f"Release notes for version {version} not found in CHANGELOG.md")

          section = match.group(0).strip()
          pathlib.Path("release_body.md").write_text(section, encoding="utf-8")
          PY

      - name: Build release ZIP
        if: env.EXISTS == 'false'
        run: |
          cd "${{ github.workspace }}/custom_components/v2c_cloud"
          zip v2c_cloud.zip -r ./

      # Generate a Software Bill of Materials in both SPDX-JSON and CycloneDX
      # formats so downstream consumers (HACS users, security scanners) can
      # consume whichever standard they prefer. The action scans the integration
      # source tree directly, including the dependency manifest files.
      - name: Generate SBOM (SPDX-JSON)
        if: env.EXISTS == 'false'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: ${{ github.workspace }}
          format: spdx-json
          artifact-name: v2c_cloud-${{ env.VERSION }}.spdx.json
          output-file: ${{ github.workspace }}/v2c_cloud-${{ env.VERSION }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate SBOM (CycloneDX-JSON)
        if: env.EXISTS == 'false'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: ${{ github.workspace }}
          format: cyclonedx-json
          artifact-name: v2c_cloud-${{ env.VERSION }}.cyclonedx.json
          output-file: ${{ github.workspace }}/v2c_cloud-${{ env.VERSION }}.cyclonedx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Create GitHub Release
        if: env.EXISTS == 'false'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body_path: release_body.md
          files: |
            ${{ github.workspace }}/custom_components/v2c_cloud/v2c_cloud.zip
            ${{ github.workspace }}/v2c_cloud-${{ env.VERSION }}.spdx.json
            ${{ github.workspace }}/v2c_cloud-${{ env.VERSION }}.cyclonedx.json

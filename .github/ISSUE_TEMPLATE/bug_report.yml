name: Bug report
description: Create a report to help us improve

body:
  - type: markdown
    attributes:
      value: |
        # Bug Report for the V2C Cloud Integration

        > [!IMPORTANT]
        > **Before submitting an issue:**
        >
        > ✅ Make sure you are using the latest version of the integration.
        > ✅ Check your logs for error messages and attach them.
        > ✅ Search existing [issues][issue] to see if your problem has already been reported.
        > ✅ Search existing [discussions][df] to see if your problem has already been discussed, or to ask a question.
        >
        > Thank you for your report!
        >
        > [!NOTE]
        > Incomplete reports (unclear description, missing log output, unsupported platform) will be closed without further comment.
        >
        > [df]: https://github.com/samuelebistoletti/HomeAssistant-V2C-Cloud/discussions
        > [issue]: https://github.com/samuelebistoletti/HomeAssistant-V2C-Cloud/issues?q=is%3Aissue

  - type: input
    id: integration_version
    attributes:
      label: Integration version
      description: Version of the V2C Cloud integration (visible in Settings → Devices & Services → V2C Cloud).
      placeholder: "e.g. 1.1.1"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      description: Version of your Home Assistant instance (visible in Settings → About).
      placeholder: "e.g. 2024.12.0"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual
    validations:
      required: true

  - type: dropdown
    id: charger_model
    attributes:
      label: Charger model
      options:
        - Trydan
        - Trydan Pro
        - Other / Unknown
    validations:
      required: true

  - type: dropdown
    id: connection_type
    attributes:
      label: Connection mode
      description: Is the charger reachable on the local network (LAN), or does it rely only on the cloud?
      options:
        - Cloud + LAN (static IP / DHCP reservation)
        - Cloud only (no local IP available)
        - Unknown
    validations:
      required: true

  - type: textarea
    validations:
      required: true
    attributes:
      label: Describe the bug
      description: >-
        Provide a clear and concise description of the issue. Include what you expected to happen and what actually happened.

  - type: textarea
    validations:
      required: true
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
        ...
      description: >-
        List the steps to reproduce the behaviour.

  - type: textarea
    validations:
      required: true
    attributes:
      label: Log details
      render: text
      description: >
        Attach relevant log output. Enable debug logging first — see the
        README section "Logging & Diagnostics" for instructions (add
        `custom_components.v2c_cloud: debug` under `logger.logs` in your
        `configuration.yaml`). Mask any API keys or personal data before pasting.

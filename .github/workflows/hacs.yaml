name: HACS Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: hacs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hacs:
    name: HACS Action
    permissions:
      contents: read
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v7"
        with:
          persist-credentials: false
      - name: HACS Action
        uses: "hacs/action@d556e736723344f83838d08488c983a15381059a"  # v22.5.0
        with:
          category: "integration"
